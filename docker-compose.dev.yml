# Desenvolvimento: hot reload + MySQL (TypeORM usa estas variáveis no código)
services:
  nest-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/usr/src/app
      - nest_node_modules:/usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_USER: ${DATABASE_USER:-app}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-app}
      DATABASE_NAME: ${DATABASE_NAME:-nest}
    command: npm run start:dev

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DATABASE_NAME:-nest}
      MYSQL_USER: ${DATABASE_USER:-app}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-app}
    ports:
      - "${MYSQL_PUBLISH_PORT:-3307}:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  nest_node_modules:
  mysql-data-dev:
